name: Create Repo for RustDesk latest

on:
  schedule:
    # Every Saturday at 3AM UTC
    - cron: "0 3 * * 6"
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
  REPO_NAME: xlion-rustdesk-latest-apt-repo
  CODENAME: main
  COMPONENTS: main
  DISTRIBUTION: main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Verify container
    runs-on: ubuntu-24.04-arm
    steps:
        - name: Install Cosign
          uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

        - name: Verify
          run: |
            set -euo pipefail
            cosign verify --rekor-url=https://rekor.sigstore.dev \
            --certificate-identity-regexp "https://github.com/xlionjuan/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/xlionjuan/fedora-createrepo-image:latest

  prepare:
    name: Prepare
    runs-on: ubuntu-24.04-arm
    needs: verify
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            persist-credentials: false

        - name: Define workfolder for utils
          run: |
            set -euo pipefail
            echo "WORKFOLDER_RD=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"
            echo "WORKFOLDER_RD_SERV=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"
            echo "WORKFOLDER_KEYRING=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"

        - name: Bootstrap repo info for xlionjuan/xlion-repo-archive-keyring
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo xlionjuan/xlion-repo-archive-keyring

        - name: Download keyring
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Copy keyring to current folder
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            set -euo pipefail
            cp -r $WORKFOLDER/*.deb .

        - name: Verify Keyring
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            set -euo pipefail
            gh attestation verify --owner xlionjuan --predicate-type 'https://in-toto.io/attestation/release' xlion-repo-archive-keyring*

        - name: Bootstrap repo info for rustdesk/rustdesk
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk

        - name: Download RustDesk
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            RUSTDESK_URL_AMD64=$(cat dl_urls.txt | grep '\.deb' | grep x86_64 | grep -v sciter)
            RUSTDESK_URL_ARM64=$(cat dl_urls.txt | grep '\.deb' | grep aarch64 | grep -v sciter)
            RUSTDESK_URL_ARMHF=$(cat dl_urls.txt | grep '\.deb' | grep armv7)

            wget2 "$RUSTDESK_URL_AMD64" "$RUSTDESK_URL_ARM64" "$RUSTDESK_URL_ARMHF"

            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Copy RustDesk to current folder
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD }}
          run: |
            set -euo pipefail
            mkdir -p ori
            cp -r $WORKFOLDER/*.deb ./ori

        - name: Bootstrap repo info for rustdesk/rustdesk-server
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD_SERV }}
          run: |
            set -euo pipefail
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo rustdesk/rustdesk-server

        - name: Download RustDesk Server
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD_SERV }}
          run: |
            set -euo pipefail
            cd $WORKFOLDER
            cat dl_urls.txt | grep '\.deb' | wget2 --input-file=-

            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Copy RustDesk Server to current folder
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_RD_SERV }}
          run: |
            set -euo pipefail
            mkdir -p ori
            cp -r $WORKFOLDER/*.deb ./ori

        - name: Create rustdesk-server-meta
          run: dpkg-deb --build rustdesk-server-meta rustdesk-server-meta.deb

        - name: Repackage
          run: |
            set -euo pipefail
            bash repackage.sh

        - name: Initialize apt repository
          run: |
            set -euo pipefail
            aptly repo create \
              -component=${{ env.COMPONENTS }} \
              -distribution=${{ env.DISTRIBUTION }} \
              repo-target

        - name: Add .deb to apt repository
          run: |
            set -euo pipefail
            aptly repo add repo-target .

        - name: Copy wwwroot to aptly public folder
          run: |
            set -euo pipefail
            mkdir -p $HOME/.aptly/public
            cp -r wwwroot/* $HOME/.aptly/public

        - name: Output summary
          run: |
            set -euo pipefail
            echo "## Aptly repo summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            aptly repo show -with-packages repo-target >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Publish aptly workspace
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: aptly-workspace
            path: ~/.aptly
            if-no-files-found: error
            include-hidden-files: true

  publish:
    name: Publish and sign repository
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
    steps:
        - name: Download aptly workspace
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: aptly-workspace
            path: ~/.aptly

        - name: Prepare ephemeral GPG home
          run: |
            set -euo pipefail
            umask 077
            echo "GNUPGHOME=$(mktemp -d)" >> "$GITHUB_ENV"
            echo "GPG_TTY=" >> "$GITHUB_ENV"

        - name: Import GPG Key
          run: |
            set -euo pipefail
            umask 077

            IMPORT_FPR="$(
              printf '%s' "$GPG_PRIVATE_KEY" |
              gpg --batch --yes --status-fd=1 --import 2>/dev/null |
              sed 's/\[GNUPG:\]/\n[GNUPG:]/g' |
              awk '/^\[GNUPG:\] IMPORT_OK/ {print $4; exit}'
            )"
            test -n "$IMPORT_FPR"
            
            echo "GPG_FINGERPRINT=$IMPORT_FPR" >> "$GITHUB_ENV"
          env:
            GPG_PRIVATE_KEY: ${{ secrets.SIGNING_KEY }}

        - name: Publish apt repository
          run: |
            set -euo pipefail
            aptly publish repo \
              -distribution=${{ env.DISTRIBUTION }} \
              -component=${{ env.COMPONENTS }} \
              -label=${{ env.REPO_NAME }} \
              -suite=${{ env.REPO_NAME }} \
              -origin=${{ env.REPO_NAME }} \
              -gpg-key=${{ env.GPG_FINGERPRINT }} \
              repo-target

        - name: Clean up
          if: always()
          run: |
            set -euo pipefail
            rm -rf "$GNUPGHOME" || true

        - name: Ensure publish path has no '.'
          run: |
            set -euo pipefail
            mkdir -p /tmp/public
            cp -r ~/.aptly/public/* /tmp/public

        - name: Output summary
          run: |
            set -euo pipefail
            echo "## Final published folder structure" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree /tmp/public >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
          with:
            name: github-pages
            path: /tmp/public

        - name: Publish Artifacts
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: cf_r2
            path: /tmp/public
            if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: publish
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  push-to-cf-r2:
    name: Push to Cloudflare R2
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: publish
    steps:
        - name: Download artifact
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: cf_r2
            path: src-dir/latest
            merge-multiple: true

        - name: Upload to Cloudflare R2
          uses: ryand56/r2-upload-action@47013c9cf0012876409579ed17399005aa287b48 # v1.3.4
          with:
            r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
            r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
            r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
            r2-bucket: ${{ secrets.R2_BUCKET }}
            keep-file-fresh: true
            source-dir: src-dir
            destination-dir: ./
